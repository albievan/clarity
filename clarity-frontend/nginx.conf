server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the test console at / and /index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache: no caching for HTML (always fresh)
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Cache static assets (fonts, images if any are added later)
    location ~* \.(woff2?|ttf|eot|otf|ico|png|svg|jpg|jpeg|gif|css)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for Docker / load balancer
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/html application/json application/javascript text/css;
    gzip_min_length 1024;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
