openapi: 3.0.3

info:
  title: Clarity Budget Management Platform API
  description: |
    ## Overview
    The Clarity API is a RESTful JSON API for the Clarity multi-tenant budget management platform.
    It covers the full lifecycle of budget planning, approval workflows, contract/agreement management,
    purchase order tracking, actuals recording, and period close.

    ## Authentication
    All endpoints (except `/auth/login` and `/auth/password/reset-request`) require a Bearer JWT
    in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    JWTs are issued by `POST /auth/login` and refreshed via `POST /auth/refresh`.
    Tokens carry `sub` (user_id), `tid` (tenant_id), and `roles` claims.

    ## Multi-tenancy
    The tenant is resolved from the JWT `tid` claim. You do **not** need to pass `tenant_id`
    in request bodies — it is always derived from the authenticated user's token.

    ## Pagination
    List endpoints accept `page` (1-based, default 1) and `per_page` (default 25, max 100).
    Responses include a `pagination` envelope:
    ```json
    {
      "data": [...],
      "pagination": { "page": 1, "per_page": 25, "total": 142, "total_pages": 6 }
    }
    ```

    ## Error Responses
    All errors return a consistent envelope:
    ```json
    {
      "error": {
        "code": "BUDGET_NOT_FOUND",
        "message": "Budget with id 42 not found",
        "details": {}
      }
    }
    ```

    ## Rate Limiting
    Rate limits are tenant-configurable. Headers returned on every response:
    - `X-RateLimit-Limit` — requests allowed per minute
    - `X-RateLimit-Remaining` — remaining requests
    - `X-RateLimit-Reset` — Unix timestamp when the window resets

    ## Idempotency
    Mutating requests (`POST`, `PUT`, `PATCH`) accept an optional
    `Idempotency-Key: <uuid>` header. Duplicate requests with the same key
    within 24 hours return the original response without re-executing.

  version: 1.0.0
  contact:
    name: Clarity Platform Team
    email: platform@clarity.internal
  license:
    name: Proprietary

servers:
  - url: https://api.clarity.example.com/v1
    description: Production
  - url: https://api.staging.clarity.example.com/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: Login, logout, token refresh, MFA, and password management
  - name: Users
    description: User account management and role assignment
  - name: Approval Delegations
    description: Delegate approval authority to another user for a date range
  - name: Departments
    description: Organisational department hierarchy
  - name: Cost Centres
    description: Financial cost allocation units within departments
  - name: Locations
    description: Geographic location hierarchy (region / country / city / office)
  - name: Currencies
    description: Currency master (read-only — managed centrally)
  - name: FX Rates
    description: Exchange rate management and period snapshots
  - name: Cost Categories
    description: Expense classification taxonomy
  - name: Support & Maintenance Types
    description: Types of support and maintenance agreements
  - name: Rejection Reasons
    description: Predefined rejection reason library
  - name: Vendors
    description: Vendor master data
  - name: Budget Periods
    description: Fiscal period definition and lifecycle management
  - name: Budgets
    description: Budget containers per department per period
  - name: Budget Lines
    description: Individual line items within a budget
  - name: Agreements
    description: Contract and support/maintenance agreement lifecycle
  - name: Intake Requests
    description: Bottom-up budget requests from requestors to department heads
  - name: Approval Workflow
    description: Approval workflow rules and approval decisions
  - name: Purchase Orders
    description: Purchase order management
  - name: PO Lines
    description: Individual line items within a purchase order
  - name: Goods Receipts
    description: Goods and services receipt recording
  - name: Actuals
    description: Confirmed expenditure recording
  - name: Forecasts
    description: Budget line spend forecasting
  - name: Period Close
    description: Structured period close wizard and carry-over management
  - name: Audit Log
    description: Immutable audit log (read-only)
  - name: Notifications
    description: In-app notification management
  - name: AI Justification
    description: AI-assisted budget justification generation
  - name: Admin
    description: Tenant-level administration (IT Administrator role required)
  - name: Documents
    description: Document attachment upload and retrieval

paths:

  # ============================================================
  # AUTHENTICATION
  # ============================================================

  /auth/login:
    post:
      tags: [Authentication]
      operationId: login
      summary: Authenticate and obtain JWT tokens
      description: |
        Authenticates a user with email and password (local auth).
        Returns a short-lived `access_token` (15 min) and a `refresh_token` (7 days).

        If the account has MFA enabled, `mfa_required: true` is returned with an
        `mfa_token` instead of `access_token`. The client must call
        `POST /auth/mfa/verify` with that token and the TOTP code to complete login.

        **Account lockout**: After `lockout_threshold` failed attempts (default 5),
        the account is locked for a configurable duration. Locked accounts return HTTP 423.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: jane.smith@acme.com
                password:
                  type: string
                  format: password
                  example: "S3cur3P@ssw0rd!"
            example:
              email: jane.smith@acme.com
              password: "S3cur3P@ssw0rd!"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccess"
                  - $ref: "#/components/schemas/MfaRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: ACCOUNT_LOCKED
                  message: Account locked until 2026-03-01T09:00:00Z
                  details:
                    locked_until: "2026-03-01T09:00:00Z"

  /auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Invalidate the current session
      description: Revokes the current session token. The token is immediately invalidated server-side.
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshToken
      summary: Refresh the access token
      description: |
        Exchanges a valid `refresh_token` for a new `access_token` (and rotates the refresh token).
        The old refresh token is immediately invalidated.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: "eyJhbGci..."
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/mfa/setup:
    post:
      tags: [Authentication]
      operationId: setupMfa
      summary: Initiate TOTP MFA setup
      description: |
        Generates a new TOTP secret and returns a QR code URI for the user to scan
        with their authenticator app. MFA is **not** activated until the user verifies
        with `POST /auth/mfa/confirm`. The secret is discarded if confirm is not called
        within 10 minutes.
      responses:
        "200":
          description: TOTP setup initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpauth_uri:
                    type: string
                    description: "URI for QR code generation (otpauth://totp/...)"
                    example: "otpauth://totp/Clarity:jane%40acme.com?secret=BASE32SECRET&issuer=Clarity"
                  secret:
                    type: string
                    description: Base32 TOTP secret for manual entry
                    example: "JBSWY3DPEHPK3PXP"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/mfa/confirm:
    post:
      tags: [Authentication]
      operationId: confirmMfa
      summary: Confirm and activate TOTP MFA
      description: |
        Validates the provided TOTP code against the pending secret and activates MFA.
        Returns a set of single-use backup codes. Store these securely — they are shown **once**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totp_code]
              properties:
                totp_code:
                  type: string
                  pattern: "^[0-9]{6}$"
                  example: "482910"
      responses:
        "200":
          description: MFA activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes:
                    type: array
                    description: Eight single-use recovery codes. Shown once — store immediately.
                    items:
                      type: string
                    example: ["ABCD-1234", "EFGH-5678"]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/mfa/verify:
    post:
      tags: [Authentication]
      operationId: verifyMfa
      summary: Complete MFA login challenge
      description: |
        Completes a login that returned `mfa_required: true`. Supply the `mfa_token`
        from the login response and the current TOTP code (or a backup code).
        Returns the standard `access_token` + `refresh_token` pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, totp_code]
              properties:
                mfa_token:
                  type: string
                  description: Token returned from the login response when mfa_required is true
                totp_code:
                  type: string
                  description: 6-digit TOTP code or 9-character backup code
                  example: "482910"
      responses:
        "200":
          description: MFA verified — full session issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/mfa/disable:
    post:
      tags: [Authentication]
      operationId: disableMfa
      summary: Disable MFA for the authenticated user
      description: Requires the current TOTP code as confirmation before disabling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totp_code]
              properties:
                totp_code:
                  type: string
                  example: "482910"
      responses:
        "204":
          description: MFA disabled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password/change:
    post:
      tags: [Authentication]
      operationId: changePassword
      summary: Change password for the authenticated user
      description: |
        Requires the current password. The new password is validated against the tenant's
        security policy (minimum length, complexity) and cannot match the last 12 passwords.
        All existing sessions except the current one are revoked on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 12
      responses:
        "204":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password/reset-request:
    post:
      tags: [Authentication]
      operationId: requestPasswordReset
      summary: Request a password reset email
      description: |
        Sends a password reset link to the email address if an active account exists.
        Always returns 204 regardless of whether the email is found (prevents enumeration).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Reset email dispatched (if account exists)

  /auth/password/reset:
    post:
      tags: [Authentication]
      operationId: resetPassword
      summary: Complete a password reset
      description: Consumes the one-time reset token from the email link and sets the new password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reset_token, new_password]
              properties:
                reset_token:
                  type: string
                new_password:
                  type: string
                  format: password
                  minLength: 12
      responses:
        "204":
          description: Password reset complete
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sessions:
    get:
      tags: [Authentication]
      operationId: listSessions
      summary: List active sessions for the authenticated user
      description: Returns all non-revoked sessions. Useful for "Manage devices" UIs.
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sessions/{sessionId}:
    delete:
      tags: [Authentication]
      operationId: revokeSession
      summary: Revoke a specific session (sign out a device)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # USERS
  # ============================================================

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users in the tenant
      description: |
        Returns paginated users. IT Administrators see all users.
        Department Heads see users in their department only.
        **Required role:** Budget Approver, Department Head, IT Administrator, Finance Controller.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, locked, suspended, deprovisioned, pending_setup]
          description: Filter by account status
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role name (e.g. Budget Owner)
        - name: department_id
          in: query
          schema:
            type: integer
          description: Filter by department
        - name: q
          in: query
          schema:
            type: string
          description: Search by name or email (partial match)
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Users]
      operationId: createUser
      summary: Create a new user
      description: |
        Creates a user account and sends a welcome email with a one-time setup link.
        The user must set their password on first login (`require_pw_change` defaults to `true`).
        **Required role:** IT Administrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email already exists in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}:
    get:
      tags: [Users]
      operationId: getUser
      summary: Get a user by ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Users]
      operationId: updateUser
      summary: Update a user's profile
      description: |
        Updates display_name and non-security fields. Use dedicated endpoints for
        password changes, role changes, and status changes.
        **Required role:** IT Administrator (for other users), or the user themselves (display_name only).
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Users]
      operationId: deprovisionUser
      summary: Deprovision a user account
      description: |
        Sets status to `deprovisioned` and revokes all active sessions.
        The user record is retained for audit integrity.
        **Required role:** IT Administrator.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deprovisioned
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/roles:
    get:
      tags: [Users]
      operationId: listUserRoles
      summary: List role assignments for a user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Role assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserRoleAssignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Users]
      operationId: assignRole
      summary: Assign a role to a user
      description: |
        Assigns a role, optionally scoped to a department. Assigning with
        `department_id: null` grants tenant-wide scope.
        **Required role:** IT Administrator.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: integer
                  description: ID of the role to assign
                  example: 3
                department_id:
                  type: integer
                  nullable: true
                  description: Scope the role to this department. Null for tenant-wide scope.
                  example: 7
      responses:
        "201":
          description: Role assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserRoleAssignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Role already assigned at this scope

  /users/{userId}/roles/{assignmentId}:
    delete:
      tags: [Users]
      operationId: revokeRole
      summary: Revoke a role assignment
      description: "Sets `revoked_at` on the assignment. **Required role:** IT Administrator."
      parameters:
        - $ref: "#/components/parameters/UserId"
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Role revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/lock:
    post:
      tags: [Users]
      operationId: lockUser
      summary: Lock a user account
      description: |
        Manually locks the account and revokes all active sessions.
        Useful for security incidents. **Required role:** IT Administrator.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for locking (recorded in audit log)
                locked_until:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional lock expiry. Null = permanent until manually unlocked.
      responses:
        "204":
          description: Account locked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/unlock:
    post:
      tags: [Users]
      operationId: unlockUser
      summary: Unlock a locked user account
      description: "Clears the lock and resets `failed_login_count`. **Required role:** IT Administrator."
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Account unlocked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # APPROVAL DELEGATIONS
  # ============================================================

  /approval-delegations:
    get:
      tags: [Approval Delegations]
      operationId: listApprovalDelegations
      summary: List approval delegations
      description: |
        Returns delegations where the caller is either the delegator or the delegate.
        IT Administrators and Finance Controllers can see all delegations.
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
          description: When true, only return delegations within their active date range
      responses:
        "200":
          description: Delegation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalDelegation"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Approval Delegations]
      operationId: createApprovalDelegation
      summary: Create an approval delegation
      description: |
        Delegates the caller's approval authority to another user for a date range.
        The delegate must have at least one approval-capable role.
        Delegator and delegate cannot be the same user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalDelegationRequest"
      responses:
        "201":
          description: Delegation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalDelegation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /approval-delegations/{delegationId}:
    get:
      tags: [Approval Delegations]
      operationId: getApprovalDelegation
      summary: Get a specific delegation
      parameters:
        - $ref: "#/components/parameters/DelegationId"
      responses:
        "200":
          description: Delegation detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalDelegation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /approval-delegations/{delegationId}/revoke:
    post:
      tags: [Approval Delegations]
      operationId: revokeApprovalDelegation
      summary: Revoke an active delegation early
      description: Can only be called by the delegator or an IT Administrator.
      parameters:
        - $ref: "#/components/parameters/DelegationId"
      responses:
        "204":
          description: Delegation revoked
        "400":
          description: Delegation already revoked or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
