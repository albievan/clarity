  # ============================================================
  # BUDGET PERIODS
  # ============================================================

  /budget-periods:
    get:
      tags: [Budget Periods]
      operationId: listBudgetPeriods
      summary: List budget periods
      parameters:
        - name: fiscal_year
          in: query
          schema:
            type: integer
          description: Filter by fiscal year e.g. 2026
        - name: status
          in: query
          schema:
            type: string
            enum: [open, soft_locked, hard_locked, closed, archived]
      responses:
        "200":
          description: Budget period list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BudgetPeriod"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Budget Periods]
      operationId: createBudgetPeriod
      summary: Create a budget period
      description: "**Required role:** Finance Controller."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetPeriodRequest"
      responses:
        "201":
          description: Budget period created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /budget-periods/{periodId}:
    get:
      tags: [Budget Periods]
      operationId: getBudgetPeriod
      summary: Get a budget period by ID
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      responses:
        "200":
          description: Budget period detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetPeriod"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Budget Periods]
      operationId: updateBudgetPeriod
      summary: Update a budget period
      description: |
        Only `name`, `start_date`, and `end_date` can be updated on open periods.
        Closed/locked periods cannot be modified — use the reopen flow.
        **Required role:** Finance Controller.
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
      responses:
        "200":
          description: Period updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budget-periods/{periodId}/reopen:
    post:
      tags: [Budget Periods]
      operationId: reopenBudgetPeriod
      summary: Reopen a closed or locked budget period
      description: |
        Requires two-person integrity — the caller is `reopened_by` and a second
        Finance Controller must be provided as `second_approver_id`. The justification
        is mandatory and is recorded in the period_reopen_log table.
        **Required role:** Finance Controller.
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [second_approver_id, justification]
              properties:
                second_approver_id:
                  type: integer
                  description: User ID of a second Finance Controller (cannot be the caller)
                  example: 12
                justification:
                  type: string
                  minLength: 20
                  example: Correction required for incorrect actuals entry on line 445
      responses:
        "200":
          description: Period reopened
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # BUDGETS
  # ============================================================

  /budgets:
    get:
      tags: [Budgets]
      operationId: listBudgets
      summary: List budgets
      description: |
        Finance Controllers and Budget Approvers see all budgets.
        Budget Owners see budgets for their departments.
        Department Heads see their department's budgets.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: period_id
          in: query
          schema:
            type: integer
          description: Filter by budget period
        - name: department_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, approved, rejected, returned, closed]
        - name: created_by
          in: query
          schema:
            type: integer
          description: Filter by creator user ID
      responses:
        "200":
          description: Paginated budget list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BudgetSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Budgets]
      operationId: createBudget
      summary: Create a budget
      description: |
        Creates a budget in `draft` status. The budget must be submitted for approval
        via `POST /budgets/{id}/submit` before it enters the approval workflow.
        **Required role:** Budget Owner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
      responses:
        "201":
          description: Budget created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /budgets/{budgetId}:
    get:
      tags: [Budgets]
      operationId: getBudget
      summary: Get a budget with its lines and approval status
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      responses:
        "200":
          description: Budget detail including lines and approval history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Budget"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Budgets]
      operationId: updateBudget
      summary: Update budget metadata (name)
      description: "Only `draft` and `returned` budgets can be updated. **Required role:** Budget Owner."
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Budget updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Budgets]
      operationId: deleteBudget
      summary: Delete a draft budget
      description: |
        Only `draft` budgets with no lines can be deleted. Submitted or approved budgets
        must be rejected/returned and then cannot be deleted.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      responses:
        "204":
          description: Budget deleted
        "400":
          description: Budget cannot be deleted in its current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budgets/{budgetId}/submit:
    post:
      tags: [Budgets]
      operationId: submitBudget
      summary: Submit a budget for approval
      description: |
        Transitions status from `draft` or `returned` to `pending`.
        The server evaluates the applicable approval workflow rules and creates the
        corresponding `budget_approvals` rows.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      responses:
        "200":
          description: Budget submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Budget"
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/BudgetApproval"
        "400":
          description: Budget has no lines or is not in a submittable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budgets/{budgetId}/approve:
    post:
      tags: [Budgets]
      operationId: approveBudget
      summary: Approve a budget (approval level decision)
      description: |
        Records an approval decision for the caller's pending approval level.
        If TPI is required, the `approval_id` returned must be confirmed via
        `POST /budgets/{id}/approvals/{approvalId}/tpi-confirm`.
        If all levels are approved, the budget status transitions to `approved`.
        **Required role:** Budget Approver (or delegated approver).
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: Optional approval comment
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetApproval"
                  budget_status:
                    type: string
                    enum: [pending, approved]
                    description: New status of the budget after this decision
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budgets/{budgetId}/reject:
    post:
      tags: [Budgets]
      operationId: rejectBudget
      summary: Reject a budget
      description: |
        Records a rejection decision. The budget status transitions to `rejected`.
        **Required role:** Budget Approver.
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejection_reason_id]
              properties:
                rejection_reason_id:
                  type: integer
                  description: FK to rejection_reasons table
                rejection_comment:
                  type: string
                  description: Free-text comment (required when reason code is OTHER)
      responses:
        "200":
          description: Budget rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetApproval"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budgets/{budgetId}/return:
    post:
      tags: [Budgets]
      operationId: returnBudget
      summary: Return a budget for amendment
      description: |
        Returns the budget to the Budget Owner for amendment with a comment.
        Status transitions to `returned`. The Budget Owner can amend lines and resubmit.
        **Required role:** Budget Approver.
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [return_comment]
              properties:
                return_comment:
                  type: string
                  minLength: 10
                  description: Explanation of what needs to be amended
      responses:
        "200":
          description: Budget returned for amendment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetApproval"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budgets/{budgetId}/approvals/{approvalId}/tpi-confirm:
    post:
      tags: [Budgets]
      operationId: tpiConfirmApproval
      summary: Submit a Two-Person Integrity confirmation
      description: |
        A second approver (different from the primary approver) confirms a TPI-required
        approval level. The primary approval is not finalised until this is submitted.
        **Required role:** Budget Approver (different user from the primary approver).
      parameters:
        - $ref: "#/components/parameters/BudgetId"
        - name: approvalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
                  minLength: 10
                  description: Mandatory TPI confirmation statement
      responses:
        "201":
          description: TPI confirmation recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TpiConfirmation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # BUDGET LINES
  # ============================================================

  /budgets/{budgetId}/lines:
    get:
      tags: [Budget Lines]
      operationId: listBudgetLines
      summary: List lines for a budget
      parameters:
        - $ref: "#/components/parameters/BudgetId"
        - name: budget_type
          in: query
          schema:
            type: string
            enum: [capex, opex]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, approved, rejected, returned]
      responses:
        "200":
          description: Budget line list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BudgetLine"
                  summary:
                    $ref: "#/components/schemas/BudgetLineSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Budget Lines]
      operationId: createBudgetLine
      summary: Add a budget line
      description: |
        Adds a line to a budget. Only allowed when budget is in `draft` or `returned` status.
        If `cost_splits` is provided, the splits must sum to 100%.
        If `is_contract_linked: true`, an agreement must be created via `POST /agreements`.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/BudgetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetLineRequest"
      responses:
        "201":
          description: Budget line created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budget-lines/{lineId}:
    get:
      tags: [Budget Lines]
      operationId: getBudgetLine
      summary: Get a budget line by ID
      description: Includes cost splits, change history, running balance, documents, and linked agreement (if any).
      parameters:
        - $ref: "#/components/parameters/LineId"
      responses:
        "200":
          description: Budget line detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetLineDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Budget Lines]
      operationId: updateBudgetLine
      summary: Update a budget line
      description: |
        Updates an existing budget line. If the budget is `approved` and the amount changes
        by more than the tenant's configured threshold, the line is flagged for re-approval
        and a `budget_line_cost_changes` record is created.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/LineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetLineRequest"
      responses:
        "200":
          description: Budget line updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetLine"
                  requires_reapproval:
                    type: boolean
                    description: True if the change triggers re-approval
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Budget Lines]
      operationId: deleteBudgetLine
      summary: Delete a budget line
      description: |
        Only allowed when the parent budget is in `draft` or `returned` status
        and the line has no associated POs or actuals.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/LineId"
      responses:
        "204":
          description: Budget line deleted
        "400":
          description: Line cannot be deleted — has associated POs or actuals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /budget-lines/{lineId}/documents:
    get:
      tags: [Documents]
      operationId: listBudgetLineDocuments
      summary: List documents attached to a budget line
      parameters:
        - $ref: "#/components/parameters/LineId"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentAttachment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Documents]
      operationId: uploadBudgetLineDocument
      summary: Upload a document to a budget line
      description: |
        Accepts `multipart/form-data`. The file is stored in object storage (S3/compatible)
        and metadata is recorded in `document_attachments`.
        Max file size: 25MB. Allowed types: PDF, DOCX, XLSX, PNG, JPG.
        Subject to `max_quote_uploads` tenant limit for quote documents.
      parameters:
        - $ref: "#/components/parameters/LineId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The document file
                document_type:
                  type: string
                  enum: [quote, supporting_evidence, contract, other]
                  description: Type of document being uploaded
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DocumentAttachment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: File too large (max 25MB)

  # ============================================================
  # AGREEMENTS
  # ============================================================

  /agreements:
    get:
      tags: [Agreements]
      operationId: listAgreements
      summary: List agreements
      description: Returns all agreements the caller has access to based on their role and department scope.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, expiring_soon, expired, cancelled, renewed]
        - name: term_type
          in: query
          schema:
            type: string
            enum: [fixed_term, rolling, evergreen, one_off]
        - name: vendor_id
          in: query
          schema:
            type: integer
        - name: budget_line_id
          in: query
          schema:
            type: integer
          description: Return agreement linked to this budget line
        - name: expiry_before
          in: query
          schema:
            type: string
            format: date
          description: Return agreements expiring on or before this date (useful for renewal pipeline)
        - name: q
          in: query
          schema:
            type: string
          description: Search by agreement name or reference number
      responses:
        "200":
          description: Paginated agreement list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AgreementSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Agreements]
      operationId: createAgreement
      summary: Create a new agreement
      description: |
        Creates a contract/support/maintenance agreement. If this agreement underpins a
        budget line, set `budget_line_id`. Setting `auto_generate_renewal: true` will
        cause the system to generate a projected renewal budget line when the period rolls over.
        **Required role:** Budget Owner, Finance Controller, or IT Administrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgreementRequest"
      responses:
        "201":
          description: Agreement created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Agreement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /agreements/{agreementId}:
    get:
      tags: [Agreements]
      operationId: getAgreement
      summary: Get an agreement by ID
      description: Includes expiry alerts, acknowledgements, linked budget lines, and documents.
      parameters:
        - $ref: "#/components/parameters/AgreementId"
      responses:
        "200":
          description: Agreement detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Agreement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Agreements]
      operationId: updateAgreement
      summary: Update an agreement
      description: |
        Cannot update an `expired` or `cancelled` agreement.
        If `end_date` is changed, the expiry alert schedule is recalculated.
        **Required role:** Budget Owner (for own agreements), Finance Controller.
      parameters:
        - $ref: "#/components/parameters/AgreementId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgreementRequest"
      responses:
        "200":
          description: Agreement updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Agreement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agreements/{agreementId}/cancel:
    post:
      tags: [Agreements]
      operationId: cancelAgreement
      summary: Cancel an agreement
      description: |
        Sets status to `cancelled`. Any scheduled expiry alerts are deactivated.
        **Required role:** Finance Controller or IT Administrator.
      parameters:
        - $ref: "#/components/parameters/AgreementId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancellation_reason]
              properties:
                cancellation_reason:
                  type: string
                  minLength: 10
      responses:
        "200":
          description: Agreement cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Agreement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agreements/{agreementId}/expiry-alerts:
    get:
      tags: [Agreements]
      operationId: listExpiryAlerts
      summary: List expiry alerts for an agreement
      description: Returns the scheduled 90-, 30-, and 7-day alerts and their status.
      parameters:
        - $ref: "#/components/parameters/AgreementId"
      responses:
        "200":
          description: Expiry alert list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpiryAlert"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agreements/{agreementId}/expiry-alerts/{alertId}/acknowledge:
    post:
      tags: [Agreements]
      operationId: acknowledgeExpiryAlert
      summary: Acknowledge an expiry alert with a structured response
      description: |
        Records the acknowledgement and the user's intended action regarding renewal.
        Once acknowledged, `escalated: true` is cleared if set.
        **Required role:** Any role with access to the agreement.
      parameters:
        - $ref: "#/components/parameters/AgreementId"
        - name: alertId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response_type]
              properties:
                response_type:
                  type: string
                  enum:
                    - renewal_in_progress
                    - not_renewing_will_lapse
                    - transferred_to_new_agreement
                    - deferred
                  description: |
                    - `renewal_in_progress`: A new agreement or budget line is being prepared.
                    - `not_renewing_will_lapse`: The agreement will not be renewed.
                    - `transferred_to_new_agreement`: A successor agreement exists.
                    - `deferred`: Action deferred; another alert will be generated.
                notes:
                  type: string
                  description: Optional supporting notes
                new_agreement_id:
                  type: integer
                  nullable: true
                  description: Required when response_type is transferred_to_new_agreement
      responses:
        "201":
          description: Acknowledgement recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AlertAcknowledgement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # INTAKE REQUESTS
  # ============================================================

  /intake-requests:
    get:
      tags: [Intake Requests]
      operationId: listIntakeRequests
      summary: List budget intake requests
      description: |
        Budget Requestors see their own requests.
        Department Heads see all requests in their department.
        Finance Controllers and Budget Approvers see all requests.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, approved, rejected, cancelled, converted]
        - name: department_id
          in: query
          schema:
            type: integer
        - name: period_id
          in: query
          schema:
            type: integer
        - name: requested_by
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated intake request list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/IntakeRequestSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Intake Requests]
      operationId: createIntakeRequest
      summary: Submit a new budget intake request
      description: |
        Creates a request in `draft` status. Must be submitted via
        `POST /intake-requests/{id}/submit` to enter the pre-approval workflow.
        **Required role:** Budget Requestor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntakeRequestRequest"
      responses:
        "201":
          description: Intake request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /intake-requests/{requestId}:
    get:
      tags: [Intake Requests]
      operationId: getIntakeRequest
      summary: Get an intake request by ID
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intake request detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Intake Requests]
      operationId: updateIntakeRequest
      summary: Update a draft intake request
      description: Only `draft` and `returned` requests can be updated.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntakeRequestRequest"
      responses:
        "200":
          description: Intake request updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /intake-requests/{requestId}/submit:
    post:
      tags: [Intake Requests]
      operationId: submitIntakeRequest
      summary: Submit an intake request for Department Head pre-approval
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /intake-requests/{requestId}/approve:
    post:
      tags: [Intake Requests]
      operationId: approveIntakeRequest
      summary: Approve an intake request (Department Head)
      description: |
        Approves the request, transitioning it to `approved`. The Department Head
        can then call `POST /intake-requests/{id}/convert` to create the budget line.
        **Required role:** Department Head.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /intake-requests/{requestId}/reject:
    post:
      tags: [Intake Requests]
      operationId: rejectIntakeRequest
      summary: Reject an intake request (Department Head)
      description: "**Required role:** Department Head."
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejection_reason_id]
              properties:
                rejection_reason_id:
                  type: integer
                rejection_comment:
                  type: string
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntakeRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /intake-requests/{requestId}/convert:
    post:
      tags: [Intake Requests]
      operationId: convertIntakeRequest
      summary: Convert an approved intake request to a budget line
      description: |
        Creates a budget line from the approved intake request. The created line ID is
        stored as `resulting_budget_line_id` on the intake request.
        The request transitions to `converted`.
        **Required role:** Budget Owner or Department Head.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [budget_id]
              properties:
                budget_id:
                  type: integer
                  description: The budget to add the resulting line to
      responses:
        "201":
          description: Budget line created from intake request
          content:
            application/json:
              schema:
                type: object
                properties:
                  intake_request:
                    $ref: "#/components/schemas/IntakeRequest"
                  budget_line:
                    $ref: "#/components/schemas/BudgetLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # APPROVAL WORKFLOW
  # ============================================================

  /approval-workflow-rules:
    get:
      tags: [Approval Workflow]
      operationId: listWorkflowRules
      summary: List approval workflow rules
      description: "**Required role:** Finance Controller or IT Administrator."
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Workflow rule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Approval Workflow]
      operationId: createWorkflowRule
      summary: Create an approval workflow rule
      description: |
        Configures a level in the approval workflow chain. Rules are evaluated in
        `level_number` order. Rules can be scoped to a role, amount threshold,
        department, and/or budget type.
        **Required role:** Finance Controller or IT Administrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRuleRequest"
      responses:
        "201":
          description: Workflow rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WorkflowRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /approval-workflow-rules/{ruleId}:
    put:
      tags: [Approval Workflow]
      operationId: updateWorkflowRule
      summary: Update an approval workflow rule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRuleRequest"
      responses:
        "200":
          description: Workflow rule updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WorkflowRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Approval Workflow]
      operationId: deleteWorkflowRule
      summary: Delete (deactivate) an approval workflow rule
      description: "Sets `is_active: false`. Historical approvals using this rule are unaffected."
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rule deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /approvals/pending:
    get:
      tags: [Approval Workflow]
      operationId: listPendingApprovals
      summary: List pending approvals for the authenticated user
      description: |
        Returns all budget approvals awaiting the caller's action, including delegated
        approvals where the caller is the active delegate.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Pending approval list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BudgetApproval"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # PURCHASE ORDERS
  # ============================================================

  /purchase-orders:
    get:
      tags: [Purchase Orders]
      operationId: listPurchaseOrders
      summary: List purchase orders
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: budget_line_id
          in: query
          schema:
            type: integer
        - name: vendor_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, approved, rejected, open, partially_received, fully_received, closed, cancelled]
        - name: period_id
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
          description: Search by PO number or description
      responses:
        "200":
          description: Paginated PO list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PurchaseOrderSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Purchase Orders]
      operationId: createPurchaseOrder
      summary: Create a purchase order
      description: |
        Creates a PO in `draft` status. The PO must be submitted for approval.
        `po_number` is auto-generated if not provided (format: PO-{tenant_prefix}-{year}-{seq}).
        The `total_amount` is validated against the remaining budget on the linked `budget_line_id`.
        **Required role:** Budget Owner or Department Head.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderRequest"
      responses:
        "201":
          description: PO created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /purchase-orders/{poId}:
    get:
      tags: [Purchase Orders]
      operationId: getPurchaseOrder
      summary: Get a purchase order by ID
      description: Returns PO with lines, goods receipts, disputes, and approval history.
      parameters:
        - $ref: "#/components/parameters/PoId"
      responses:
        "200":
          description: PO detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Purchase Orders]
      operationId: updatePurchaseOrder
      summary: Update a draft purchase order
      description: "Only `draft` and `returned` POs can be updated. **Required role:** Budget Owner."
      parameters:
        - $ref: "#/components/parameters/PoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseOrderRequest"
      responses:
        "200":
          description: PO updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /purchase-orders/{poId}/submit:
    post:
      tags: [Purchase Orders]
      operationId: submitPurchaseOrder
      summary: Submit a PO for approval
      parameters:
        - $ref: "#/components/parameters/PoId"
      responses:
        "200":
          description: PO submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /purchase-orders/{poId}/close:
    post:
      tags: [Purchase Orders]
      operationId: closePurchaseOrder
      summary: Close a purchase order
      description: |
        Closes the PO. `closure_type` determines how any unreceipted value is treated.
        - `normal`: All lines fully received — auto-closes when all receipts are confirmed.
        - `force_close`: Override close despite outstanding receipts (Finance Controller only).
        - `fully_received`: Explicitly closed after all goods received.
        **Required role:** Budget Owner (`normal`/`fully_received`); Finance Controller (`force_close`).
      parameters:
        - $ref: "#/components/parameters/PoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [closure_type]
              properties:
                closure_type:
                  type: string
                  enum: [normal, force_close, fully_received]
                force_close_reason:
                  type: string
                  description: Required when closure_type is force_close
      responses:
        "200":
          description: PO closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # PO LINES
  # ============================================================

  /purchase-orders/{poId}/lines:
    get:
      tags: [PO Lines]
      operationId: listPoLines
      summary: List lines for a PO
      parameters:
        - $ref: "#/components/parameters/PoId"
      responses:
        "200":
          description: PO line list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PoLine"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [PO Lines]
      operationId: createPoLine
      summary: Add a line to a draft PO
      parameters:
        - $ref: "#/components/parameters/PoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePoLineRequest"
      responses:
        "201":
          description: PO line created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PoLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /purchase-orders/{poId}/lines/{lineId}:
    put:
      tags: [PO Lines]
      operationId: updatePoLine
      summary: Update a PO line (draft PO only)
      parameters:
        - $ref: "#/components/parameters/PoId"
        - name: lineId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePoLineRequest"
      responses:
        "200":
          description: PO line updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PoLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [PO Lines]
      operationId: deletePoLine
      summary: Delete a line from a draft PO
      parameters:
        - $ref: "#/components/parameters/PoId"
        - name: lineId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: PO line deleted
        "400":
          description: PO is not in draft status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # GOODS RECEIPTS
  # ============================================================

  /purchase-orders/{poId}/receipts:
    get:
      tags: [Goods Receipts]
      operationId: listGoodsReceipts
      summary: List goods receipts for a PO
      parameters:
        - $ref: "#/components/parameters/PoId"
      responses:
        "200":
          description: Goods receipt list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GoodsReceipt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Goods Receipts]
      operationId: createGoodsReceipt
      summary: Record a goods or services receipt
      description: |
        Records receipt of goods or services against a PO. If `condition_status` is
        `disputed`, a `po_disputes` record should be created via
        `POST /purchase-orders/{poId}/disputes`.
        On `accepted` condition, the server automatically creates an `actuals` record
        for the received amount.
        **Required role:** Budget Owner or Department Head.
      parameters:
        - $ref: "#/components/parameters/PoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoodsReceiptRequest"
      responses:
        "201":
          description: Receipt recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GoodsReceipt"
                  actual_created:
                    $ref: "#/components/schemas/Actual"
                    nullable: true
                    description: The actual created from this receipt (null if condition is disputed)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /purchase-orders/{poId}/disputes:
    get:
      tags: [Goods Receipts]
      operationId: listPoDisputes
      summary: List disputes for a PO
      parameters:
        - $ref: "#/components/parameters/PoId"
      responses:
        "200":
          description: Dispute list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PoDispute"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Goods Receipts]
      operationId: createPoDispute
      summary: Raise a dispute for a goods receipt
      description: |
        Records a dispute against a goods receipt with a disputed amount and description.
        Must be resolved via `PUT /purchase-orders/{poId}/disputes/{disputeId}/resolve`
        before the PO can be closed.
        **Required role:** Budget Owner.
      parameters:
        - $ref: "#/components/parameters/PoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePoDisputeRequest"
      responses:
        "201":
          description: Dispute created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PoDispute"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /purchase-orders/{poId}/disputes/{disputeId}/resolve:
    put:
      tags: [Goods Receipts]
      operationId: resolvePoDispute
      summary: Resolve a PO dispute
      description: |
        Records the resolution of a dispute. The `resolution` value determines
        whether an actual is created for a partial amount.
        - `accepted`: Full disputed amount is accepted — actual created.
        - `partial_accepted`: A `resolved_amount` is accepted — actual created for that amount.
        - `rejected`: Disputed amount is rejected — no actual created.
        **Required role:** Finance Controller or Budget Owner.
      parameters:
        - $ref: "#/components/parameters/PoId"
        - name: disputeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution, resolution_notes]
              properties:
                resolution:
                  type: string
                  enum: [accepted, partial_accepted, rejected]
                resolved_amount:
                  type: number
                  format: decimal
                  description: Required when resolution is partial_accepted
                resolution_notes:
                  type: string
                  minLength: 10
      responses:
        "200":
          description: Dispute resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PoDispute"
                  actual_created:
                    $ref: "#/components/schemas/Actual"
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # ACTUALS
  # ============================================================

  /actuals:
    get:
      tags: [Actuals]
      operationId: listActuals
      summary: List actuals
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: budget_line_id
          in: query
          schema:
            type: integer
        - name: period_id
          in: query
          schema:
            type: integer
        - name: source
          in: query
          schema:
            type: string
            enum: [manual, po_receipt, bulk_import, system]
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated actuals list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Actual"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Actuals]
      operationId: createActual
      summary: Manually record an actual expenditure
      description: |
        Creates a manual actual against a budget line. Use this for direct invoices,
        expenses, or corrections not going through the PO flow.
        `transaction_date` must fall within the open budget period.
        **Required role:** Finance Controller or Budget Owner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActualRequest"
      responses:
        "201":
          description: Actual created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Actual"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /actuals/{actualId}:
    get:
      tags: [Actuals]
      operationId: getActual
      summary: Get an actual by ID
      parameters:
        - name: actualId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Actual detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Actual"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Actuals]
      operationId: amendActual
      summary: Amend an actual (creates amendment record)
      description: |
        Creates an amended version of the actual. The original is soft-deleted
        (`is_deleted: true`) and a new record is created with `amended_from_id`
        pointing to the original. Only `amount`, `description`, and `transaction_date`
        can be amended.
        **Required role:** Finance Controller.
      parameters:
        - name: actualId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  format: decimal
                description:
                  type: string
                transaction_date:
                  type: string
                  format: date
                amendment_reason:
                  type: string
                  description: Reason for amendment (recorded in audit log)
                  minLength: 10
      responses:
        "200":
          description: Actual amended
          content:
            application/json:
              schema:
                type: object
                properties:
                  original:
                    $ref: "#/components/schemas/Actual"
                  amended:
                    $ref: "#/components/schemas/Actual"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /actuals/bulk-import:
    post:
      tags: [Actuals]
      operationId: bulkImportActuals
      summary: Bulk import actuals from CSV
      description: |
        Accepts a CSV file with columns: `budget_line_id`, `amount`, `currency_code`,
        `transaction_date`, `description`, `vendor_id` (optional), `reference` (optional).
        Returns a job ID. Poll `GET /actuals/bulk-import/{jobId}` for status.
        Rows with validation errors are reported without affecting valid rows (partial import).
        **Required role:** Finance Controller.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file (max 50,000 rows)
                period_id:
                  type: integer
                  description: Validate that all transaction_dates fall within this period
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status_url:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /actuals/bulk-import/{jobId}:
    get:
      tags: [Actuals]
      operationId: getBulkImportStatus
      summary: Get the status of a bulk import job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

