                      $ref: "#/components/schemas/BudgetForecast"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Forecasts]
      operationId: createForecast
      summary: Create or update a forecast for a budget line
      description: |
        Creates a new forecast version. The `version_number` is auto-incremented.
        If `method` is `linear` or `committed_actuals`, the `forecast_amount` is
        calculated by the server from actuals and committed PO values.
        If `method` is `manual`, `forecast_amount` must be provided.
        **Required role:** Budget Owner or Finance Controller.
      parameters:
        - $ref: "#/components/parameters/LineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForecastRequest"
      responses:
        "201":
          description: Forecast created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BudgetForecast"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # PERIOD CLOSE
  # ============================================================

  /period-close/sessions:
    get:
      tags: [Period Close]
      operationId: listPeriodCloseSessions
      summary: List period close sessions
      description: "**Required role:** Finance Controller."
      parameters:
        - name: period_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [in_progress, completed, reopened, abandoned]
      responses:
        "200":
          description: Period close session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PeriodCloseSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Period Close]
      operationId: startPeriodCloseSession
      summary: Start a new period close session
      description: |
        Initiates the 7-step period close wizard for a budget period.
        Only one `in_progress` session can exist per period.
        **Required role:** Finance Controller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period_id]
              properties:
                period_id:
                  type: integer
      responses:
        "201":
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PeriodCloseSession"
        "400":
          description: Session already in progress for this period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /period-close/sessions/{sessionId}:
    get:
      tags: [Period Close]
      operationId: getPeriodCloseSession
      summary: Get a period close session with step log
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session detail with completed steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PeriodCloseSessionDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /period-close/sessions/{sessionId}/steps:
    post:
      tags: [Period Close]
      operationId: completePeriodCloseStep
      summary: Mark a period close step as complete
      description: |
        Records the completion of a step in the period close wizard. Steps must be
        completed in order (1–7). The session auto-completes when step 7 is marked done
        and the period status transitions to `closed`.

        **Steps:**
        1. Validate all actuals are reconciled
        2. Confirm all open POs are resolved or force-closed
        3. Run final budget vs actuals reconciliation report
        4. Lock period (transitions to `hard_locked`)
        5. Process carry-over rules
        6. Generate period close report
        7. Archive period

        **Required role:** Finance Controller.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step_number]
              properties:
                step_number:
                  type: integer
                  minimum: 1
                  maximum: 7
                notes:
                  type: string
                  description: Optional completion notes
      responses:
        "201":
          description: Step completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PeriodCloseStepLog"
                  session_completed:
                    type: boolean
                    description: True if this was the final step and the session is now complete
        "400":
          description: Step out of order or already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /period-close/carry-over-rules:
    get:
      tags: [Period Close]
      operationId: listCarryOverRules
      summary: List carry-over rules for a period
      parameters:
        - name: period_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Carry-over rule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CarryOverRule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Period Close]
      operationId: createCarryOverRule
      summary: Define a carry-over rule for a budget line
      description: |
        Sets how remaining budget on a line should be handled at period close.
        - `full_remaining`: Carry over the entire remaining balance.
        - `committed_only`: Carry over only the committed (open PO) value.
        - `specified_amount`: Carry over a defined `carry_over_amount`.
        - `do_not_carry`: No carry-over; remaining budget is released.

        On session step 5, the server processes these rules and populates `resulting_line_id`
        with the newly created carry-over budget line in the next period.
        **Required role:** Finance Controller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarryOverRuleRequest"
      responses:
        "201":
          description: Carry-over rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CarryOverRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ============================================================
  # AUDIT LOG
  # ============================================================

  /audit-log:
    get:
      tags: [Audit Log]
      operationId: listAuditLog
      summary: Query the audit log
      description: |
        Returns audit log entries in reverse chronological order. The audit log is
        append-only — entries cannot be modified or deleted. Each entry includes a
        SHA-512 hash and a chain to the previous entry for tamper detection.
        **Required role:** IT Administrator or Finance Controller.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: entity_type
          in: query
          schema:
            type: string
          description: Filter by entity type (e.g. budgets, budget_lines, actuals)
        - name: entity_id
          in: query
          schema:
            type: integer
          description: Filter by entity ID (requires entity_type)
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action (e.g. INSERT, UPDATE, DELETE, APPROVE)
        - name: actor_user_id
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /audit-log/{entryId}:
    get:
      tags: [Audit Log]
      operationId: getAuditLogEntry
      summary: Get a single audit log entry including before/after state
      description: Returns the full entry including `before_state` and `after_state` JSON snapshots.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Audit log entry detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuditLogEntryDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

