  /documents/{documentId}:
    get:
      tags: [Documents]
      operationId: getDocumentDownloadUrl
      summary: Get a pre-signed download URL for a document
      description: |
        Returns a time-limited pre-signed URL (valid for 15 minutes) for direct
        download from object storage. The URL is single-use and tenant-scoped.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pre-signed download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url:
                    type: string
                    format: uri
                    description: Pre-signed URL (valid 15 min)
                  expires_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Documents]
      operationId: deleteDocument
      summary: Delete a document attachment
      description: |
        Soft-deletes the document_attachments record and schedules deletion of the
        object storage file. Quote documents cannot be deleted after the budget is approved.
        **Required role:** Budget Owner (for their own uploads); Finance Controller.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Document deleted
        "400":
          description: Document cannot be deleted in current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by POST /auth/login. Include as:
        `Authorization: Bearer <token>`

  # ----------------------------------------------------------
  # REUSABLE PARAMETERS
  # ----------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based)

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Results per page (max 100)

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
      description: User ID

    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
      description: Session ID

    DelegationId:
      name: delegationId
      in: path
      required: true
      schema:
        type: integer
      description: Approval delegation ID

    DepartmentId:
      name: departmentId
      in: path
      required: true
      schema:
        type: integer
      description: Department ID

    CostCentreId:
      name: costCentreId
      in: path
      required: true
      schema:
        type: integer
      description: Cost centre ID

    VendorId:
      name: vendorId
      in: path
      required: true
      schema:
        type: integer
      description: Vendor ID

    PeriodId:
      name: periodId
      in: path
      required: true
      schema:
        type: integer
      description: Budget period ID

    BudgetId:
      name: budgetId
      in: path
      required: true
      schema:
        type: integer
      description: Budget ID

    LineId:
      name: lineId
      in: path
      required: true
      schema:
        type: integer
      description: Budget line ID

    AgreementId:
      name: agreementId
      in: path
      required: true
      schema:
        type: integer
      description: Agreement ID

    PoId:
      name: poId
      in: path
      required: true
      schema:
        type: integer
      description: Purchase order ID

  # ----------------------------------------------------------
  # REUSABLE RESPONSES
  # ----------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: VALIDATION_ERROR
              message: Validation failed
              details:
                fields:
                  amount: must be greater than 0
                  currency_code: must be a valid ISO 4217 code

    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required

    Forbidden:
      description: Forbidden — insufficient role or scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions for this action

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ----------------------------------------------------------
  # SCHEMAS
  # ----------------------------------------------------------
  schemas:

    # ---- Shared ----

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: BUDGET_NOT_FOUND
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Additional context (e.g. field validation errors)

    PaginatedResponse:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer

    Timestamps:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # ---- Auth ----

    LoginSuccess:
      type: object
      properties:
        access_token:
          type: string
          description: Short-lived JWT (15 min)
        refresh_token:
          type: string
          description: Long-lived refresh token (7 days)
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900
        user:
          $ref: "#/components/schemas/UserSummary"

    MfaRequired:
      type: object
      properties:
        mfa_required:
          type: boolean
          enum: [true]
        mfa_token:
          type: string
          description: One-time token to complete MFA verification. Valid for 5 minutes.

    Session:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            ip_address:
              type: string
              format: ipv4
            user_agent:
              type: string
            last_used_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            is_current:
              type: boolean
              description: True if this is the session making the request

    # ---- Users ----

    UserSummary:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
        display_name:
          type: string
        status:
          type: string
          enum: [active, locked, suspended, deprovisioned, pending_setup]
        roles:
          type: array
          items:
            type: string
          description: Role names for display only
          example: ["Budget Owner", "Budget Approver"]
        avatar_url:
          type: string
          format: uri
          nullable: true

    User:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            auth_provider:
              type: string
              enum: [local, sso, scim]
            mfa_enabled:
              type: boolean
            require_pw_change:
              type: boolean
            last_login_at:
              type: string
              format: date-time
              nullable: true
            failed_login_count:
              type: integer
            locked_until:
              type: string
              format: date-time
              nullable: true
            department_id:
              type: integer
              nullable: true
            location_id:
              type: integer
              nullable: true
            scim_external_id:
              type: string
              nullable: true
              description: External ID from SCIM provisioner

    CreateUserRequest:
      type: object
      required: [email, display_name]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 2
          maxLength: 100
        auth_provider:
          type: string
          enum: [local, sso]
          default: local
        department_id:
          type: integer
          nullable: true
        location_id:
          type: integer
          nullable: true
        require_pw_change:
          type: boolean
          default: true
        role_ids:
          type: array
          items:
            type: integer
          description: Roles to assign on creation

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
          minLength: 2
          maxLength: 100
        department_id:
          type: integer
          nullable: true
        location_id:
          type: integer
          nullable: true

    UserRoleAssignment:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            role_id:
              type: integer
            role_name:
              type: string
              example: Budget Owner
            department_id:
              type: integer
              nullable: true
              description: Scope — null means tenant-wide
            department_name:
              type: string
              nullable: true
            granted_by_user_id:
              type: integer
            revoked_at:
              type: string
              format: date-time
              nullable: true

    # ---- Approval Delegations ----

    ApprovalDelegation:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            delegator_user_id:
              type: integer
            delegator_name:
              type: string
            delegate_user_id:
              type: integer
            delegate_name:
              type: string
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
            reason:
              type: string
            is_active:
              type: boolean
              description: True if today is within start_date..end_date and not revoked
            revoked_at:
              type: string
              format: date-time
              nullable: true

    CreateApprovalDelegationRequest:
      type: object
      required: [delegate_user_id, start_date, end_date]
      properties:
        delegate_user_id:
          type: integer
          description: User to delegate to (cannot be the caller)
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          description: Must be after start_date
        reason:
          type: string
          description: Optional reason for the delegation

    # ---- Departments ----

    Department:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: Information Technology
            code:
              type: string
              example: IT
            parent_id:
              type: integer
              nullable: true
              description: Parent department ID (null = top-level)
            parent_name:
              type: string
              nullable: true
            head_user_id:
              type: integer
              nullable: true
              description: User ID of the department head
            head_user_name:
              type: string
              nullable: true
            status:
              type: string
              enum: [active, inactive, archived]
            cost_centre_id:
              type: integer
              nullable: true

    CreateDepartmentRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          maxLength: 150
        code:
          type: string
          maxLength: 20
          description: Unique department code within the tenant
        parent_id:
          type: integer
          nullable: true
        head_user_id:
          type: integer
          nullable: true
        cost_centre_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, inactive]
          default: active

    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
        head_user_id:
          type: integer
          nullable: true
        cost_centre_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, inactive, archived]

    # ---- Cost Centres ----

    CostCentre:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            code:
              type: string
              example: CC-IT-001
            name:
              type: string
              example: IT Infrastructure
            department_id:
              type: integer
            department_name:
              type: string
            status:
              type: string
              enum: [active, inactive, archived]

    CreateCostCentreRequest:
      type: object
      required: [code, name, department_id]
      properties:
        code:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 150
        department_id:
          type: integer
        status:
          type: string
          enum: [active, inactive]
          default: active

    # ---- Locations ----

    Location:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            region:
              type: string
              example: EMEA
            country:
              type: string
              example: United Kingdom
            country_code:
              type: string
              example: GB
            city:
              type: string
              example: London
            office_name:
              type: string
              nullable: true
              example: London HQ
            status:
              type: string
              enum: [active, inactive, archived]

    CreateLocationRequest:
      type: object
      required: [region, country, country_code, city]
      properties:
        region:
          type: string
          maxLength: 50
        country:
          type: string
          maxLength: 100
        country_code:
          type: string
          maxLength: 3
        city:
          type: string
          maxLength: 100
        office_name:
          type: string
          maxLength: 150
          nullable: true
        status:
          type: string
          enum: [active, inactive]
          default: active

    # ---- Currencies & FX ----

    Currency:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          description: ISO 4217 code
          example: GBP
        name:
          type: string
          example: British Pound Sterling
        symbol:
          type: string
          example: "£"
        decimal_places:
          type: integer
          example: 2
        is_active:
          type: boolean

    FxRate:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            from_currency:
              type: string
              example: USD
            to_currency:
              type: string
              example: GBP
            rate:
              type: number
              format: decimal
              example: 0.7892
            effective_date:
              type: string
              format: date
            is_snapshot:
              type: boolean
              description: True if this rate is locked to a budget period
            budget_period_id:
              type: integer
              nullable: true
            source:
              type: string
              nullable: true
              description: Source of the rate (e.g. ECB, manual)

    CreateFxRateRequest:
      type: object
      required: [from_currency, to_currency, rate, effective_date]
      properties:
        from_currency:
          type: string
          example: USD
        to_currency:
          type: string
          example: GBP
        rate:
          type: number
          format: decimal
          minimum: 0.000001
        effective_date:
          type: string
          format: date
        is_snapshot:
          type: boolean
          default: false
        budget_period_id:
          type: integer
          nullable: true
          description: Required when is_snapshot is true
        source:
          type: string
          nullable: true

    # ---- Cost Categories ----

    CostCategory:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: Cloud Infrastructure
            code:
              type: string
              example: CLOUD_INFRA
            budget_type:
              type: string
              enum: [capex, opex, both]
            description:
              type: string
              nullable: true
            status:
              type: string
              enum: [active, inactive, archived]

    CreateCostCategoryRequest:
      type: object
      required: [name, code, budget_type]
      properties:
        name:
          type: string
          maxLength: 150
        code:
          type: string
          maxLength: 30
          description: Unique code within the tenant
        budget_type:
          type: string
          enum: [capex, opex, both]
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
          default: active

    # ---- Support/Maintenance Types ----

    SmType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Software Maintenance
        is_active:
          type: boolean

    # ---- Rejection Reasons ----

    RejectionReason:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          example: BUDGET_EXCEEDED
        description:
          type: string
          example: The requested amount exceeds available budget
        category:
          type: string
          enum: [financial, documentation, policy, timing, commercial, process, other]
        requires_comment:
          type: boolean
          description: True if a free-text comment is mandatory when using this reason
        is_active:
          type: boolean

    CreateRejectionReasonRequest:
      type: object
      required: [code, description, category]
      properties:
        code:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 255
        category:
          type: string
          enum: [financial, documentation, policy, timing, commercial, process, other]
        requires_comment:
          type: boolean
          default: false

    # ---- Vendors ----

    Vendor:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: Acme Cloud Solutions Ltd
            vendor_type:
              type: string
              enum: [supplier, licensor, contractor, consultant, managed_service]
            status:
              type: string
              enum: [preferred, approved, under_review, suspended, archived]
            contact_name:
              type: string
              nullable: true
            contact_email:
              type: string
              format: email
              nullable: true
            contact_phone:
              type: string
              nullable: true
            website:
              type: string
              format: uri
              nullable: true
            payment_terms_days:
              type: integer
              nullable: true
            tags:
              type: array
              items:
                type: string
              description: Vendor category tags
              example: ["cloud", "networking"]

    CreateVendorRequest:
      type: object
      required: [name, vendor_type]
      properties:
        name:
          type: string
          maxLength: 200
        vendor_type:
          type: string
          enum: [supplier, licensor, contractor, consultant, managed_service]
        status:
          type: string
          enum: [preferred, approved, under_review, suspended]
          default: under_review
        contact_name:
          type: string
          nullable: true
        contact_email:
          type: string
          format: email
          nullable: true
        contact_phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        payment_terms_days:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string

    # ---- Budget Periods ----

    BudgetPeriod:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: FY2026 H1
            fiscal_year:
              type: integer
              example: 2026
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
            status:
              type: string
              enum: [open, soft_locked, hard_locked, closed, archived]
            base_currency:
              type: string
              example: GBP
            created_by_user_id:
              type: integer

    CreateBudgetPeriodRequest:
      type: object
      required: [name, fiscal_year, start_date, end_date, base_currency]
      properties:
        name:
          type: string
          maxLength: 100
        fiscal_year:
          type: integer
          example: 2026
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        base_currency:
          type: string
          description: ISO 4217 code — base currency for this period
          example: GBP

    # ---- Budgets ----

    BudgetSummary:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: IT Infrastructure FY2026 H1
            period_id:
              type: integer
            period_name:
              type: string
            department_id:
              type: integer
            department_name:
              type: string
            status:
              type: string
              enum: [draft, pending, approved, rejected, returned, closed]
            total_amount:
              type: number
              format: decimal
              description: Sum of all approved line amounts
            currency_code:
              type: string
            created_by_user_id:
              type: integer

    Budget:
      allOf:
        - $ref: "#/components/schemas/BudgetSummary"
        - type: object
          properties:
            lines:
              type: array
              items:
                $ref: "#/components/schemas/BudgetLine"
            approvals:
              type: array
              items:
                $ref: "#/components/schemas/BudgetApproval"

    CreateBudgetRequest:
      type: object
      required: [name, period_id, department_id, currency_code]
      properties:
        name:
          type: string
          maxLength: 200
        period_id:
          type: integer
        department_id:
          type: integer
        currency_code:
          type: string
          description: ISO 4217 code
          example: GBP

    # ---- Budget Lines ----

    BudgetLine:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_id:
              type: integer
            description:
              type: string
            budget_type:
              type: string
              enum: [capex, opex]
            amount:
              type: number
              format: decimal
            currency_code:
              type: string
            cost_category_id:
              type: integer
            cost_category_name:
              type: string
            vendor_id:
              type: integer
              nullable: true
            vendor_name:
              type: string
              nullable: true
            sm_type_id:
              type: integer
              nullable: true
            is_contract_linked:
              type: boolean
              description: True if this line is backed by a formal agreement
            is_projection:
              type: boolean
              description: True if this is a system-generated renewal projection
            source_line_id:
              type: integer
              nullable: true
              description: ID of the prior period line this was carried over from
            status:
              type: string
              enum: [draft, pending, approved, rejected, returned]
            justification:
              type: string
              nullable: true
              description: AI-assisted or manually entered justification text

    BudgetLineDetail:
      allOf:
        - $ref: "#/components/schemas/BudgetLine"
        - type: object
          properties:
            cost_splits:
              type: array
              items:
                $ref: "#/components/schemas/CostSplit"
            change_history:
              type: array
              items:
                $ref: "#/components/schemas/LineChangeRecord"
            running_balance:
              $ref: "#/components/schemas/RunningBalance"
            agreement:
              $ref: "#/components/schemas/AgreementSummary"
              nullable: true
            documents:
              type: array
              items:
                $ref: "#/components/schemas/DocumentAttachment"

    BudgetLineSummary:
      type: object
      properties:
        total_lines:
          type: integer
        total_amount:
          type: number
          format: decimal
        capex_total:
          type: number
          format: decimal
        opex_total:
          type: number
          format: decimal
        currency_code:
          type: string

    CostSplit:
      type: object
      properties:
        id:
          type: integer
        cost_centre_id:
          type: integer
        cost_centre_name:
          type: string
        split_percentage:
          type: number
          format: decimal
          description: 0–100, all splits for a line must sum to 100
          example: 60.00

    LineChangeRecord:
      type: object
      properties:
        id:
          type: integer
        changed_at:
          type: string
          format: date-time
        changed_by_user_id:
          type: integer
        changed_by_name:
          type: string
        old_amount:
          type: number
          format: decimal
        new_amount:
          type: number
          format: decimal
        change_reason:
          type: string

    RunningBalance:
      type: object
      properties:
        total_budget:
          type: number
          format: decimal
        total_committed:
          type: number
          format: decimal
          description: Sum of open PO values
        total_actuals:
          type: number
          format: decimal
          description: Confirmed actuals (not soft-deleted)
        remaining:
          type: number
          format: decimal
          description: total_budget - total_committed - total_actuals
        pct_committed_or_spent:
          type: number
          format: decimal
          description: (committed + actuals) / total_budget × 100

    CreateBudgetLineRequest:
      type: object
      required: [description, budget_type, amount, currency_code, cost_category_id]
      properties:
        description:
          type: string
          maxLength: 500
        budget_type:
          type: string
          enum: [capex, opex]
        amount:
          type: number
          format: decimal
          minimum: 0.01
        currency_code:
          type: string
          example: GBP
        cost_category_id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        sm_type_id:
          type: integer
          nullable: true
        is_contract_linked:
          type: boolean
          default: false
        justification:
          type: string
          nullable: true
        cost_splits:
          type: array
          description: If omitted, 100% is assigned to the budget's department default cost centre
          items:
            type: object
            required: [cost_centre_id, split_percentage]
            properties:
              cost_centre_id:
                type: integer
              split_percentage:
                type: number
                format: decimal
                minimum: 0.01
                maximum: 100

    UpdateBudgetLineRequest:
      type: object
      properties:
        description:
          type: string
        amount:
          type: number
          format: decimal
          minimum: 0.01
        cost_category_id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        sm_type_id:
          type: integer
          nullable: true
        justification:
          type: string
          nullable: true
        change_reason:
          type: string
          description: Required when changing amount on an approved line

    # ---- Budget Approvals ----

    BudgetApproval:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_id:
              type: integer
            level_number:
              type: integer
              description: Approval level in the workflow chain
            rule_id:
              type: integer
              description: FK to the workflow rule that generated this approval
            approver_user_id:
              type: integer
              description: Assigned approver. May differ from original_approver_id if delegated.
            approver_name:
              type: string
            original_approver_user_id:
              type: integer
              nullable: true
              description: Set when a delegation is active — the original assignee
            status:
              type: string
              enum: [pending, approved, rejected, returned, escalated, superseded]
            decided_at:
              type: string
              format: date-time
              nullable: true
            comment:
              type: string
              nullable: true
            rejection_reason_id:
              type: integer
              nullable: true
            requires_tpi:
              type: boolean
            tpi_confirmed:
              type: boolean
              description: True when TPI confirmation has been submitted

    TpiConfirmation:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            approval_id:
              type: integer
            confirmed_by_user_id:
              type: integer
            confirmed_by_name:
              type: string
            comment:
              type: string

    # ---- Workflow Rules ----

    WorkflowRule:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: Finance Controller >50k
            level_number:
              type: integer
              description: Position in the approval chain (lower = earlier)
            role_id:
              type: integer
              description: Role that is assigned as approver at this level
            role_name:
              type: string
            min_amount:
              type: number
              format: decimal
              nullable: true
              description: Rule applies when budget total >= min_amount
            max_amount:
              type: number
              format: decimal
              nullable: true
              description: Rule applies when budget total < max_amount (null = no upper limit)
            department_id:
              type: integer
              nullable: true
              description: Null = applies to all departments
            budget_type:
              type: string
              enum: [capex, opex, both]
              nullable: true
              description: Null = applies to both types
            requires_tpi:
              type: boolean
              description: True = a second approver confirmation is required
            escalation_days:
              type: integer
              nullable: true
              description: Days before escalation if no decision made. Null = no auto-escalation
            is_active:
              type: boolean

    CreateWorkflowRuleRequest:
      type: object
      required: [name, level_number, role_id]
      properties:
        name:
          type: string
        level_number:
          type: integer
          minimum: 1
        role_id:
          type: integer
        min_amount:
          type: number
          format: decimal
          nullable: true
        max_amount:
          type: number
          format: decimal
          nullable: true
        department_id:
          type: integer
          nullable: true
        budget_type:
          type: string
          enum: [capex, opex, both]
          nullable: true
        requires_tpi:
          type: boolean
          default: false
        escalation_days:
          type: integer
          nullable: true

    # ---- Agreements ----

    AgreementSummary:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: AWS Enterprise Support Agreement
            reference_number:
              type: string
              nullable: true
            vendor_id:
              type: integer
            vendor_name:
              type: string
            term_type:
              type: string
              enum: [fixed_term, rolling, evergreen, one_off]
            status:
              type: string
              enum: [draft, active, expiring_soon, expired, cancelled, renewed]
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
              nullable: true
            annual_value:
              type: number
              format: decimal
              nullable: true
            currency_code:
              type: string
            days_to_expiry:
              type: integer
              nullable: true
              description: Calculated field — days until end_date (negative if expired)

    Agreement:
      allOf:
        - $ref: "#/components/schemas/AgreementSummary"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            sm_type_id:
              type: integer
              nullable: true
            budget_line_id:
              type: integer
              nullable: true
            auto_generate_renewal:
              type: boolean
            cost_increase_pct:
              type: number
              format: decimal
              nullable: true
              description: Expected annual cost increase % (used for renewal projections)
            notice_period_days:
              type: integer
              nullable: true
              description: Contract notice period for cancellation
            expiry_alerts:
              type: array
              items:
                $ref: "#/components/schemas/ExpiryAlert"
            documents:
              type: array
              items:
                $ref: "#/components/schemas/DocumentAttachment"

    CreateAgreementRequest:
      type: object
      required: [name, vendor_id, term_type, start_date, currency_code]
      properties:
        name:
          type: string
          maxLength: 200
        reference_number:
          type: string
          nullable: true
        vendor_id:
          type: integer
        term_type:
          type: string
          enum: [fixed_term, rolling, evergreen, one_off]
        status:
          type: string
          enum: [draft, active]
          default: draft
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
          description: Required for fixed_term
        annual_value:
          type: number
          format: decimal
          nullable: true
        currency_code:
          type: string
        description:
          type: string
          nullable: true
        sm_type_id:
          type: integer
          nullable: true
        budget_line_id:
          type: integer
          nullable: true
        auto_generate_renewal:
          type: boolean
          default: false
        cost_increase_pct:
          type: number
          format: decimal
          nullable: true
        notice_period_days:
          type: integer
          nullable: true

    UpdateAgreementRequest:
      type: object
      properties:
        name:
          type: string
        reference_number:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active]
        end_date:
          type: string
          format: date
          nullable: true
        annual_value:
          type: number
          format: decimal
          nullable: true
        cost_increase_pct:
          type: number
          format: decimal
          nullable: true
        notice_period_days:
          type: integer
          nullable: true
        auto_generate_renewal:
          type: boolean
        description:
          type: string
          nullable: true

    ExpiryAlert:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            agreement_id:
              type: integer
            alert_type:
              type: string
              enum: [ninety_day, thirty_day, seven_day]
            scheduled_at:
              type: string
              format: date-time
            sent_at:
              type: string
              format: date-time
              nullable: true
            escalated:
              type: boolean
              description: True if no acknowledgement received and escalation triggered
            acknowledgement_count:
              type: integer
              description: Number of acknowledgements for this alert

    AlertAcknowledgement:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            alert_id:
              type: integer
            acknowledged_by_user_id:
              type: integer
            acknowledged_by_name:
              type: string
            response_type:
              type: string
              enum: [renewal_in_progress, not_renewing_will_lapse, transferred_to_new_agreement, deferred]
            notes:
              type: string
              nullable: true
            new_agreement_id:
              type: integer
              nullable: true

    # ---- Intake Requests ----

    IntakeRequestSummary:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            title:
              type: string
            department_id:
              type: integer
            department_name:
              type: string
            period_id:
              type: integer
            period_name:
              type: string
            requested_by_user_id:
              type: integer
            requested_by_name:
              type: string
            status:
              type: string
              enum: [draft, submitted, approved, rejected, cancelled, converted]
            requested_amount:
              type: number
              format: decimal
            currency_code:
              type: string

    IntakeRequest:
      allOf:
        - $ref: "#/components/schemas/IntakeRequestSummary"
        - type: object
          properties:
            description:
              type: string
            justification:
              type: string
              nullable: true
            budget_type:
              type: string
              enum: [capex, opex]
            cost_category_id:
              type: integer
            vendor_id:
              type: integer
              nullable: true
            preapproved_by_user_id:
              type: integer
              nullable: true
            preapproved_at:
              type: string
              format: date-time
              nullable: true
            rejection_reason_id:
              type: integer
              nullable: true
            rejection_comment:
              type: string
              nullable: true
            resulting_budget_line_id:
              type: integer
              nullable: true
              description: Set when the request has been converted to a budget line

    CreateIntakeRequestRequest:
      type: object
      required: [title, description, department_id, period_id, requested_amount, currency_code, budget_type, cost_category_id]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        justification:
          type: string
          nullable: true
        department_id:
          type: integer
        period_id:
          type: integer
        requested_amount:
          type: number
          format: decimal
          minimum: 0.01
        currency_code:
          type: string
        budget_type:
          type: string
          enum: [capex, opex]
        cost_category_id:
          type: integer
        vendor_id:
          type: integer
          nullable: true

    # ---- Purchase Orders ----

    PurchaseOrderSummary:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            po_number:
              type: string
              example: PO-ACME-2026-0042
            budget_line_id:
              type: integer
            vendor_id:
              type: integer
            vendor_name:
              type: string
            description:
              type: string
            total_amount:
              type: number
              format: decimal
            currency_code:
              type: string
            status:
              type: string
              enum: [draft, submitted, approved, rejected, open, partially_received, fully_received, closed, cancelled]
            received_amount:
              type: number
              format: decimal
              description: Total value of confirmed receipts

    PurchaseOrder:
      allOf:
        - $ref: "#/components/schemas/PurchaseOrderSummary"
        - type: object
          properties:
            lines:
              type: array
              items:
                $ref: "#/components/schemas/PoLine"
            receipts:
              type: array
              items:
                $ref: "#/components/schemas/GoodsReceipt"
            disputes:
              type: array
              items:
                $ref: "#/components/schemas/PoDispute"
            closure_type:
              type: string
              enum: [normal, force_close, fully_received]
              nullable: true
            closed_at:
              type: string
              format: date-time
              nullable: true
            closed_by_user_id:
              type: integer
              nullable: true

    CreatePurchaseOrderRequest:
      type: object
      required: [budget_line_id, vendor_id, description, currency_code]
      properties:
        budget_line_id:
          type: integer
        vendor_id:
          type: integer
        po_number:
          type: string
          nullable: true
          description: Auto-generated if omitted
        description:
          type: string
          maxLength: 500
        currency_code:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CreatePoLineRequest"

    UpdatePurchaseOrderRequest:
      type: object
      properties:
        description:
          type: string
        vendor_id:
          type: integer

    PoLine:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            po_id:
              type: integer
            line_number:
              type: integer
            description:
              type: string
            quantity:
              type: number
              format: decimal
            unit_price:
              type: number
              format: decimal
            line_total:
              type: number
              format: decimal
              readOnly: true
              description: quantity × unit_price
            currency_code:
              type: string
            received_quantity:
              type: number
              format: decimal
              description: Sum of accepted receipt quantities for this line

    CreatePoLineRequest:
      type: object
      required: [description, quantity, unit_price, currency_code]
      properties:
        description:
          type: string
          maxLength: 300
        quantity:
          type: number
          format: decimal
          minimum: 0.001
        unit_price:
          type: number
          format: decimal
          minimum: 0
        currency_code:
          type: string

    GoodsReceipt:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            po_id:
              type: integer
            po_line_id:
              type: integer
              nullable: true
            received_date:
              type: string
              format: date
            received_quantity:
              type: number
              format: decimal
              nullable: true
            received_amount:
              type: number
              format: decimal
            currency_code:
              type: string
            condition_status:
              type: string
              enum: [accepted, disputed]
            notes:
              type: string
              nullable: true
            received_by_user_id:
              type: integer
            goods_receipt_id_on_actual:
              type: integer
              nullable: true
              description: ID of the actual created from this receipt

    CreateGoodsReceiptRequest:
      type: object
      required: [received_date, received_amount, currency_code, condition_status]
      properties:
        po_line_id:
          type: integer
          nullable: true
        received_date:
          type: string
          format: date
        received_quantity:
          type: number
          format: decimal
          nullable: true
        received_amount:
          type: number
          format: decimal
          minimum: 0.01
        currency_code:
          type: string
        condition_status:
          type: string
          enum: [accepted, disputed]
        notes:
          type: string
          nullable: true

    PoDispute:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            po_id:
              type: integer
            goods_receipt_id:
              type: integer
            disputed_amount:
              type: number
              format: decimal
            dispute_description:
              type: string
            status:
              type: string
              enum: [open, resolved]
            resolution:
              type: string
              enum: [accepted, partial_accepted, rejected]
              nullable: true
            resolved_amount:
              type: number
              format: decimal
              nullable: true
            resolution_notes:
              type: string
              nullable: true
            resolved_at:
              type: string
              format: date-time
              nullable: true
            resolved_by_user_id:
              type: integer
              nullable: true

    CreatePoDisputeRequest:
      type: object
      required: [goods_receipt_id, disputed_amount, dispute_description]
      properties:
        goods_receipt_id:
          type: integer
        disputed_amount:
          type: number
          format: decimal
          minimum: 0.01
        dispute_description:
          type: string
          minLength: 10

    # ---- Actuals ----

    Actual:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_line_id:
              type: integer
            period_id:
              type: integer
            transaction_date:
              type: string
              format: date
            amount:
              type: number
              format: decimal
            currency_code:
              type: string
            description:
              type: string
            source:
              type: string
              enum: [manual, po_receipt, bulk_import, system]
            vendor_id:
              type: integer
              nullable: true
            vendor_name:
              type: string
              nullable: true
            goods_receipt_id:
              type: integer
              nullable: true
              description: Set when source is po_receipt
            reference:
              type: string
              nullable: true
              description: Invoice number or external reference
            is_deleted:
              type: boolean
              description: Soft-deleted by period reopen or amendment
            amended_from_id:
              type: integer
              nullable: true
              description: Set on amended actuals — points to the original
            created_by_user_id:
              type: integer

    CreateActualRequest:
      type: object
      required: [budget_line_id, transaction_date, amount, currency_code, description]
      properties:
        budget_line_id:
          type: integer
        transaction_date:
          type: string
          format: date
        amount:
          type: number
          format: decimal
          minimum: 0.01
        currency_code:
          type: string
        description:
          type: string
          maxLength: 500
        vendor_id:
          type: integer
          nullable: true
        reference:
          type: string
          nullable: true

    BulkImportStatus:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, completed, completed_with_errors, failed]
        total_rows:
          type: integer
        processed_rows:
          type: integer
        successful_rows:
          type: integer
        failed_rows:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              column:
                type: string
              message:
                type: string
        completed_at:
          type: string
          format: date-time
          nullable: true

    # ---- Forecasts ----

    BudgetForecast:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_line_id:
              type: integer
            period_id:
              type: integer
            method:
              type: string
              enum: [linear, committed_actuals, manual]
              description: |
                - `linear`: Forecast derived from linear projection of actuals to period end
                - `committed_actuals`: Committed (open PO) + confirmed actuals
                - `manual`: Manually entered forecast_amount
            forecast_amount:
              type: number
              format: decimal
              description: Projected full-period spend
            rag_status:
              type: string
              enum: [green, amber, red]
              description: |
                - `green`: On track (forecast ≤ budget)
                - `amber`: At risk (forecast 100–115% of budget)
                - `red`: Over budget (forecast > 115%)
            variance_amount:
              type: number
              format: decimal
              description: forecast_amount - budget line amount (positive = overspend)
            variance_pct:
              type: number
              format: decimal
            version_number:
              type: integer
            notes:
              type: string
              nullable: true
            created_by_user_id:
              type: integer

    CreateForecastRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [linear, committed_actuals, manual]
        forecast_amount:
          type: number
          format: decimal
          description: Required when method is manual
        notes:
          type: string
          nullable: true

    # ---- Period Close ----

    PeriodCloseSession:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            period_id:
              type: integer
            period_name:
              type: string
            status:
              type: string
              enum: [in_progress, completed, reopened, abandoned]
            current_step:
              type: integer
              description: The next step to be completed (1–7)
            started_by_user_id:
              type: integer
            started_by_name:
              type: string
            completed_at:
              type: string
              format: date-time
              nullable: true

    PeriodCloseSessionDetail:
      allOf:
        - $ref: "#/components/schemas/PeriodCloseSession"
        - type: object
          properties:
            steps:
              type: array
              items:
                $ref: "#/components/schemas/PeriodCloseStepLog"

    PeriodCloseStepLog:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            session_id:
              type: integer
            step_number:
              type: integer
            step_name:
              type: string
              description: Human-readable step name
            completed_by_user_id:
              type: integer
            completed_by_name:
              type: string
            completed_at:
              type: string
              format: date-time
            notes:
              type: string
              nullable: true

    CarryOverRule:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_line_id:
              type: integer
            period_id:
              type: integer
            carry_over_type:
              type: string
              enum: [full_remaining, committed_only, specified_amount, do_not_carry]
            carry_over_amount:
              type: number
              format: decimal
              nullable: true
              description: Required when carry_over_type is specified_amount
            notes:
              type: string
              nullable: true
            resulting_line_id:
              type: integer
              nullable: true
              description: Populated after period close step 5 processes this rule
            defined_by_user_id:
              type: integer

    CreateCarryOverRuleRequest:
      type: object
      required: [budget_line_id, period_id, carry_over_type]
      properties:
        budget_line_id:
          type: integer
        period_id:
          type: integer
        carry_over_type:
          type: string
          enum: [full_remaining, committed_only, specified_amount, do_not_carry]
        carry_over_amount:
          type: number
          format: decimal
          nullable: true
          description: Required when carry_over_type is specified_amount
        notes:
          type: string
          nullable: true

    # ---- Audit Log ----

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tenant_id:
          type: integer
        entity_type:
          type: string
          example: budget_lines
        entity_id:
          type: integer
        action:
          type: string
          example: UPDATE
        actor_user_id:
          type: integer
          nullable: true
          description: Null if system-generated
        actor_name:
          type: string
          nullable: true
        session_id:
          type: integer
          nullable: true
        ip_address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    AuditLogEntryDetail:
      allOf:
        - $ref: "#/components/schemas/AuditLogEntry"
        - type: object
          properties:
            before_state:
              type: object
              additionalProperties: true
              nullable: true
              description: JSON snapshot of entity state before the action
            after_state:
              type: object
              additionalProperties: true
              nullable: true
              description: JSON snapshot of entity state after the action
            entry_hash:
              type: string
              description: SHA-512 hash of this entry for tamper detection
            previous_hash:
              type: string
              nullable: true
              description: SHA-512 hash of the preceding entry (chain root is null)

    # ---- Notifications ----

    Notification:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            notification_type:
              type: string
              description: e.g. approval_required, budget_approved, agreement_expiring, period_close_reminder
            title:
              type: string
            body:
              type: string
            entity_type:
              type: string
              nullable: true
              description: Related entity type (e.g. budgets, agreements)
            entity_id:
              type: integer
              nullable: true
            is_read:
              type: boolean
            read_at:
              type: string
              format: date-time
              nullable: true
            action_url:
              type: string
              nullable: true
              description: Deep link for the UI to navigate to the related entity

    NotificationPreferences:
      type: object
      description: |
        Each property controls whether the user receives that notification channel.
        All default to true.
      properties:
        approval_required:
          type: object
          properties:
            in_app:
              type: boolean
            email:
              type: boolean
        budget_approved:
          type: object
          properties:
            in_app:
              type: boolean
            email:
              type: boolean
        budget_rejected:
          type: object
          properties:
            in_app:
              type: boolean
            email:
              type: boolean
        agreement_expiring:
          type: object
          properties:
            in_app:
              type: boolean
            email:
              type: boolean
        period_close_reminder:
          type: object
          properties:
            in_app:
              type: boolean
            email:
              type: boolean

    # ---- AI Justification ----

    AiJustificationRequest:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            budget_line_id:
              type: integer
            status:
              type: string
              enum: [pending, processing, completed, failed]
            generated_text:
              type: string
              nullable: true
              description: Generated justification text when status is completed
            user_context:
              type: string
              nullable: true
            tone:
              type: string
              enum: [formal, concise, detailed]
            error_message:
              type: string
              nullable: true
              description: Set when status is failed
            requested_by_user_id:
              type: integer

    # ---- Admin ----

    TenantSettings:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
              description: Tenant display name
            slug:
              type: string
              description: URL-safe tenant identifier
            base_currency:
              type: string
              description: Tenant-wide default currency ISO 4217 code
            timezone:
              type: string
              example: Europe/London
            date_format:
              type: string
              example: DD/MM/YYYY
            fiscal_year_start_month:
              type: integer
              minimum: 1
              maximum: 12
            max_quote_uploads:
              type: integer
              description: Maximum quote documents per budget line
            allow_self_service_mfa:
              type: boolean
            sso_enabled:
              type: boolean
            scim_enabled:
              type: boolean
            ai_justification_enabled:
              type: boolean

    UpdateTenantSettingsRequest:
      type: object
      properties:
        name:
          type: string
        base_currency:
          type: string
        timezone:
          type: string
        date_format:
          type: string
        fiscal_year_start_month:
          type: integer
          minimum: 1
          maximum: 12
        max_quote_uploads:
          type: integer
        allow_self_service_mfa:
          type: boolean
        ai_justification_enabled:
          type: boolean

    SecurityPolicy:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            min_password_length:
              type: integer
              minimum: 8
              maximum: 128
            require_uppercase:
              type: boolean
            require_lowercase:
              type: boolean
            require_digit:
              type: boolean
            require_special:
              type: boolean
            password_history_count:
              type: integer
              description: Prevent reuse of last N passwords
              minimum: 0
              maximum: 24
            session_timeout_minutes:
              type: integer
              description: Idle session timeout
            max_session_duration_hours:
              type: integer
              description: Absolute max session lifetime regardless of activity
            lockout_threshold:
              type: integer
              description: Failed login attempts before account lock
            lockout_duration_minutes:
              type: integer
              description: Duration of automatic lockout (0 = permanent until unlocked)
            mfa_required:
              type: boolean
              description: Force MFA for all users in this tenant
            ip_allowlist_enabled:
              type: boolean
            ip_allowlist:
              type: array
              items:
                type: string
              description: CIDR blocks when ip_allowlist_enabled is true
            require_tpi_above_amount:
              type: number
              format: decimal
              nullable: true
              description: Approvals above this amount require TPI. Null = governed by workflow rules only.

    FeatureFlag:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            flag_name:
              type: string
              description: Unique flag key
              example: ai_justification
            description:
              type: string
              example: Enable AI-assisted budget justification generation
            enabled:
              type: boolean
            enabled_at:
              type: string
              format: date-time
              nullable: true
            enabled_by_user_id:
              type: integer
              nullable: true

    # ---- Documents ----

    DocumentAttachment:
      allOf:
        - $ref: "#/components/schemas/Timestamps"
        - type: object
          properties:
            id:
              type: integer
            entity_type:
              type: string
              description: Type of entity this document is attached to
              example: budget_lines
            entity_id:
              type: integer
            original_filename:
              type: string
              example: AWS-Quote-2026.pdf
            file_size_bytes:
              type: integer
            mime_type:
              type: string
              example: application/pdf
            document_type:
              type: string
              enum: [quote, supporting_evidence, contract, other]
            uploaded_by_user_id:
              type: integer
            uploaded_by_name:
              type: string