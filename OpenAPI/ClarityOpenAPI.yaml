  # ============================================================
  # AI JUSTIFICATION
  # ============================================================

  /ai-justification/generate:
    post:
      tags: [AI Justification]
      operationId: generateJustification
      summary: Generate an AI-assisted budget justification
      description: |
        Submits a request to the AI justification engine to draft supporting text for a
        budget line. The generated text is stored against the budget line and presented
        to the Budget Owner for review/edit before submission.

        Inputs are passed to the LLM: line description, cost category, vendor name,
        historical actuals for the same line in prior periods, and any freeform context
        the user provides.

        The request is asynchronous — poll `GET /ai-justification/{requestId}` for the result.
        **Required role:** Budget Owner (for their own lines only).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [budget_line_id]
              properties:
                budget_line_id:
                  type: integer
                user_context:
                  type: string
                  description: Additional context to help the AI generate better justification
                  example: "This is for the annual renewal of our monitoring platform contract."
                tone:
                  type: string
                  enum: [formal, concise, detailed]
                  default: formal
      responses:
        "202":
          description: Justification request queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: integer
                  status_url:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /ai-justification/{requestId}:
    get:
      tags: [AI Justification]
      operationId: getJustificationRequest
      summary: Get the result of an AI justification request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Justification request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiJustificationRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

