# =============================================================================
#  Clarity SQL Server — Secrets
#
#  SA password requirements (enforced by SQL Server):
#    - Minimum 8 characters
#    - Must contain: uppercase, lowercase, digit, symbol
#    - Recommended: 16+ characters for production
#
#  Generate base64 values:
#    echo -n 'your-password-here' | base64
#
#  IMPORTANT: Do NOT commit real passwords. Use Sealed Secrets or Vault.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: clarity-sqlserver-secret
  namespace: clarity-db
  labels:
    app.kubernetes.io/name: clarity-sqlserver
    app.kubernetes.io/part-of: clarity
    app.kubernetes.io/component: database
type: Opaque
data:
  # SA (System Administrator) password — sysadmin role
  # echo -n 'ChangeMe_SA_SuperStr0ng!1' | base64
  sa-password: Q2hhbmdlTWVfU0FfU3VwZXJTdHIwbmchMQ==

  # Application user password — db_datareader + db_datawriter only
  # echo -n 'ChangeMe_App_SuperStr0ng!1' | base64
  app-password: Q2hhbmdlTWVfQXBwX1N1cGVyU3RyMG5nITE=

  # Application username
  # echo -n 'clarity_app' | base64
  app-user: Y2xhcml0eV9hcHA=

  # Database name
  # echo -n 'clarity' | base64
  db-name: Y2xhcml0eQ==
