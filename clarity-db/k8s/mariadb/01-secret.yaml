# =============================================================================
#  Clarity MariaDB — Secrets
#
#  IMPORTANT: Do NOT commit this file with real passwords to source control.
#  In production, use one of:
#    - Sealed Secrets (bitnami-labs/sealed-secrets)
#    - External Secrets Operator + HashiCorp Vault
#    - k3s + Vault Agent injector
#
#  Generate base64 values:
#    echo -n 'your-password-here' | base64
#
#  Minimum password requirements (enforced by application):
#    - 16+ characters
#    - Upper + lower + digit + symbol
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: clarity-mariadb-secret
  namespace: clarity-db
  labels:
    app.kubernetes.io/name: clarity-mariadb
    app.kubernetes.io/part-of: clarity
    app.kubernetes.io/component: database
type: Opaque
data:
  # echo -n 'ChangeMe_R00t_SuperStr0ng!' | base64
  mariadb-root-password: Q2hhbmdlTWVfUjAwdF9TdXBlclN0cjBuZyE=

  # echo -n 'ChangeMe_App_SuperStr0ng!' | base64
  mariadb-password: Q2hhbmdlTWVfQXBwX1N1cGVyU3RyMG5nIQ==

  # Application username (not a password but kept in Secret for consistency)
  # echo -n 'clarity_app' | base64
  mariadb-user: Y2xhcml0eV9hcHA=

  # Database name
  # echo -n 'clarity' | base64
  mariadb-database: Y2xhcml0eQ==
