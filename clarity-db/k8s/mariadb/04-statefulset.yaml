# =============================================================================
#  Clarity MariaDB — StatefulSet
#
#  Why StatefulSet (not Deployment)?
#    - Stable, predictable pod name: clarity-mariadb-0
#    - Stable DNS: clarity-mariadb-0.clarity-mariadb-headless.clarity-db.svc.cluster.local
#    - Ordered, graceful pod startup and shutdown
#    - Required for future replication setup (master=pod-0, replicas=pod-1+)
#
#  Replace the image with your registry path before deploying:
#    registry.your-company.com/clarity/clarity-mariadb:1.0.0
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clarity-mariadb
  namespace: clarity-db
  labels:
    app.kubernetes.io/name: clarity-mariadb
    app.kubernetes.io/part-of: clarity
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "11.4"
spec:
  serviceName: clarity-mariadb-headless  # Must match headless Service name
  replicas: 1                            # Increase after configuring replication
  selector:
    matchLabels:
      app.kubernetes.io/name: clarity-mariadb
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clarity-mariadb
        app.kubernetes.io/part-of: clarity
        app.kubernetes.io/component: database
      annotations:
        # Force pod restart when Secret or ConfigMap changes
        checksum/secret: "placeholder-update-with-helm-or-kustomize"
    spec:
      # ---------------------------------------------------------------------------
      # Security context — Rocky Linux 10 SELinux compatible
      # fsGroup 999 = mysql group (matches MariaDB container user)
      # The local-path provisioner on k3s creates dirs with 777 initially;
      # fsGroup ensures the mysql user can read/write the mounted volume.
      # ---------------------------------------------------------------------------
      securityContext:
        runAsUser: 999          # mysql uid inside the mariadb image
        runAsGroup: 999         # mysql gid
        fsGroup: 999            # Applied to mounted volumes
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # Terminate gracefully — wait for in-flight transactions
      terminationGracePeriodSeconds: 60

      # Only schedule on nodes that have enough memory
      # Remove this if you have a single-node k3s cluster
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: clarity-mariadb
                topologyKey: kubernetes.io/hostname

      # ---------------------------------------------------------------------------
      # Init container — fix volume permissions on Rocky Linux 10
      # The local-path provisioner creates the volume directory owned by root.
      # This init container changes ownership to mysql (999:999) before
      # the main container starts.
      # ---------------------------------------------------------------------------
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/mysql && echo "Volume permissions fixed"']
          securityContext:
            runAsUser: 0       # Must run as root to chown
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: clarity-mariadb-data
              mountPath: /var/lib/mysql

      containers:
        - name: mariadb
          # ---------------------------------------------------------------------------
          # CHANGE THIS to your registry:
          #   e.g. registry.clarity.internal/clarity-mariadb:1.0.0
          # ---------------------------------------------------------------------------
          image: localhost:5000/clarity/clarity-mariadb:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP

          # -------------------------------------------------------------------------
          # Environment variables — credentials from Secret, config from ConfigMap
          # -------------------------------------------------------------------------
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clarity-mariadb-secret
                  key: mariadb-root-password
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: clarity-mariadb-secret
                  key: mariadb-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clarity-mariadb-secret
                  key: mariadb-password
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clarity-mariadb-secret
                  key: mariadb-database
          envFrom:
            - configMapRef:
                name: clarity-mariadb-config

          # -------------------------------------------------------------------------
          # Resource limits
          # MariaDB with 512M buffer pool needs at least 768Mi total
          # -------------------------------------------------------------------------
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"

          # -------------------------------------------------------------------------
          # Liveness probe — restart the pod if MariaDB hangs
          # -------------------------------------------------------------------------
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mariadb-admin ping
                  -h localhost
                  -u root
                  --password="${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # -------------------------------------------------------------------------
          # Readiness probe — remove from Service endpoints until DB is ready
          # -------------------------------------------------------------------------
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mariadb
                  -h localhost
                  -u "${MARIADB_USER}"
                  --password="${MARIADB_PASSWORD}"
                  -e "SELECT 1"
                  "${MARIADB_DATABASE}"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # -------------------------------------------------------------------------
          # Startup probe — give extra time for schema init on first boot
          # 120s max startup time (24 × 5s intervals)
          # -------------------------------------------------------------------------
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mariadb-admin ping
                  -h localhost
                  -u root
                  --password="${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24  # 24 × 5s = 120s maximum startup time
            successThreshold: 1

          # -------------------------------------------------------------------------
          # Volume mounts
          # -------------------------------------------------------------------------
          volumeMounts:
            - name: clarity-mariadb-data
              mountPath: /var/lib/mysql     # MariaDB data directory

          # -------------------------------------------------------------------------
          # Security context for the container
          # -------------------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # MariaDB writes to /tmp and /run
            capabilities:
              drop:
                - ALL
              add:
                - SETUID   # Required by MariaDB to drop privileges internally
                - SETGID
                - DAC_OVERRIDE

      # ---------------------------------------------------------------------------
      # Existing PVC (created separately via 03-pvc.yaml)
      # ---------------------------------------------------------------------------
      volumes:
        - name: clarity-mariadb-data
          persistentVolumeClaim:
            claimName: clarity-mariadb-data
